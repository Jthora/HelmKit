; HelmKit Mk0.5 — firmware bringup
; Target: Heltec WiFi LoRa 32 V3 (HTIT-WB32LAF)
;   MCU:        ESP32-S3FN8 (dual-core LX7 @ 240 MHz, 8 MB flash)
;   Radio:      SX1262 (915 MHz, not used at Mk0.5 — gated by mode roster)
;   Display:    SSD1306 0.96" OLED (internal I2C bus 0)
;   USB:        CP2102 USB-UART bridge (also native USB-CDC on S3)
;
; Bringup discipline:
;   - Mk0.5 = single-MCU sensor smoke tests. No LoRa, no WiFi runtime, no stim.
;   - USB serial = primary log channel to Raspberry Pi log-sink.
;   - Library versions are intentionally pinned. Do NOT relax to "latest" without
;     re-running the full sensor smoke matrix.
;
; See: docs/BUILD.md, docs/PINOUT.md, README.md
; Ref: docs/BLACKOUT_PLAN.md §2 Day 1, docs/mk_ladder.md (Mk0.5 row).

[platformio]
default_envs = mk05_heltec_v3
src_dir       = src
include_dir   = include

[env:mk05_heltec_v3]
platform     = espressif32 @ ~6.7.0
board        = heltec_wifi_lora_32_V3
framework    = arduino

; --- Pre-build: inject git SHA + schema version into build_flags ----------
extra_scripts = pre:scripts/inject_build_id.py

; --- Serial / monitor -------------------------------------------------------
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder, time, default
upload_speed   = 921600

; --- Build flags ------------------------------------------------------------
build_flags =
    -D HELMKIT_MK=050              ; 0.5.0 (integer for compile-time compare)
    -D HELMKIT_TARGET_HELTEC_V3=1
    -D ARDUINO_USB_CDC_ON_BOOT=1   ; USB-CDC logging on cold boot
    -D CORE_DEBUG_LEVEL=3          ; INFO; raise to 5 for VERBOSE during smoke tests
    -std=gnu++17
build_unflags =
    -std=gnu++11

; --- Library dependencies (PINNED) -----------------------------------------
; Heltec ESP32 board manager already includes the OLED driver. We pin the
; MAX30102 driver explicitly so a remote registry change can't silently
; alter our smoke-test baseline. Re-evaluate pins on every Mk gate.
lib_deps =
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ 1.1.2
    adafruit/Adafruit MLX90614 Library @ 2.1.5
    adafruit/Adafruit BusIO @ ~1.16.0    ; transitive pin (pulled by Adafruit MLX); locked to prevent silent bumps
    SPI                     ; framework-provided; surfaces for Adafruit_BusIO transitive
    Wire                    ; framework-provided; explicit for LDF
    ; AD8232 / GSR / MAX30205 added in Day 2 (Wave 1 arrival) and Day 4 (Wave 2)
lib_ldf_mode = deep+

; --- Partition / filesystem -------------------------------------------------
board_build.partitions = default_8MB.csv
board_build.filesystem = littlefs

; --- Test / static analysis -------------------------------------------------
check_tool = cppcheck
check_flags = --enable=warning,performance,portability --inline-suppr
test_framework = unity

; ---------------------------------------------------------------------------
; Notes:
;   - DO NOT add wifi/bluetooth lib_deps at Mk0.5. Surface area for a sensor-
;     bringup board must stay minimal; gate networking at Mk1.0.
;   - DO NOT raise upload_speed above 921600; CP2102 bridge gets flaky higher.
;   - If `pio run` fails on first invocation, it is downloading ~150 MB of
;     toolchain. That is expected. Subsequent builds are fast.
